# Tiny Tapeout project information
project:
  title:        "Tiny Sentinel"
  author:       "Tazeem Mahashin"
  discord:      ""
  description:  "A one-tile hardware sensor-integrity watchdog with adaptive baseline tracking and deterministic anomaly flags."
  language:     "Verilog"
  clock_hz:     100000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_tazeem_tiny_sentinel"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "baseline_tracker.v"
    - "anomaly_detector.v"
    - "score_accumulator.v"
    - "tt_um_tazeem_tiny_sentinel.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "sensor_sample[0]"
  ui[1]: "sensor_sample[1]"
  ui[2]: "sensor_sample[2]"
  ui[3]: "sensor_sample[3]"
  ui[4]: "sensor_sample[4]"
  ui[5]: "sensor_sample[5]"
  ui[6]: "sensor_sample[6]"
  ui[7]: "sensor_sample[7]"

  # Outputs
  uo[0]: "any_anomaly"
  uo[1]: "spike_detected"
  uo[2]: "stuck_detected"
  uo[3]: "drift_detected"
  uo[4]: "anomaly_score[0]"
  uo[5]: "anomaly_score[1]"
  uo[6]: "anomaly_score[2]"
  uo[7]: "alert_latched"

  # Bidirectional pins
  uio[0]: "learn_enable"
  uio[1]: "strict_mode"
  uio[2]: "freeze_baseline"
  uio[3]: "clear_latched_alert"
  uio[4]: "baseline_debug[4]"
  uio[5]: "baseline_debug[5]"
  uio[6]: "baseline_debug[6]"
  uio[7]: "baseline_debug[7]"

# Do not change!
yaml_version: 6
